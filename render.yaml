services:
  # ── Unified Java Spring Boot + React Application ───────────────────
  - type: web
    name: rajani-voice-analyser
    runtime: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://rajani-voice-analyser.onrender.com

  # ── Frontend App (React + Vite) ────────────────────────────────────
  - type: web
    name: rajani-voice-analyser-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
