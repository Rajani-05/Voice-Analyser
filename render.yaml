services:
  # ── Backend API (FastAPI) ──────────────────────────────────────────
  - type: web
    name: rajani-voice-analyser-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
